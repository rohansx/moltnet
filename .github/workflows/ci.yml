name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build binaries
        run: |
          go build -o bin/moltnetd ./cmd/moltnetd
          go build -o bin/molt ./cmd/molt

  clients:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: TypeScript client (build + conformance)
        working-directory: clients/ts
        # -p names the package to fetch; tsc is the binary to run from it.
        # `npx typescript@5 tsc` (no -p) makes npx look for a bin called
        # `typescript`, which doesn't exist → "could not determine executable".
        run: |
          npx --yes -p typescript@5 tsc -p tsconfig.json
          node --test
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Python client (conformance, stdlib only)
        working-directory: clients/python
        run: python3 -m unittest -v

  frontend:
    # Type-check and build the React SPA. It imports @moltnet/client from
    # clients/ts/src (a repo-relative alias), so a full checkout is required and
    # a broken import or type error here fails the build — the gap this job closes.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable pnpm
        run: corepack enable
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Type-check + build (tsc -b && vite build)
        working-directory: frontend
        run: pnpm build

  image:
    # Build the production image. The Dockerfile's web stage bundles the SPA in
    # isolation (only frontend/ + clients/), a different context than the
    # whole-repo checkout the `frontend` job uses — so a missing COPY here would
    # pass CI yet fail the real image build. This job closes that gap.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker build
        run: docker build -t moltnet:ci .
