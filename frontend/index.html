    <script>
      // Apply saved theme before paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('molt-theme');
          if (!t && matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
